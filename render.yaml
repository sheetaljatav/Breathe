# Render Blueprint: provisions backend (web + worker), frontend (static), Postgres, and Redis.
# Docs: https://render.com/docs/blueprint-spec
#
# After first deploy, set in the Render dashboard:
#   On `breathe-web`:
#     - DJANGO_SECRET_KEY                (Generate Value)
#     - DJANGO_ALLOWED_HOSTS             (your-web-service.onrender.com)
#     - DJANGO_CORS_ALLOWED_ORIGINS      (your frontend origin, e.g. https://breathe-frontend.onrender.com)
#     - SENTRY_DSN                       (optional)
#   On `breathe-frontend`:
#     - VITE_API_BASE_URL                (https://breathe-web.onrender.com)
#
# DATABASE_URL and REDIS_URL on backend services are wired automatically.

databases:
  - name: breathe-postgres
    plan: free
    databaseName: breathe
    user: breathe

services:
  - type: redis
    name: breathe-redis
    plan: free
    ipAllowList: []        # internal-only; no public ingress

  # ---------------------------------------------------------------- backend
  - type: web
    name: breathe-web
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: |
      pip install -r requirements.txt &&
      python manage.py collectstatic --noinput &&
      python manage.py migrate --noinput
    startCommand: gunicorn breathe.wsgi:application --workers 2 --bind 0.0.0.0:$PORT
    healthCheckPath: /healthz
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: breathe.settings.prod
      - key: DJANGO_SECRET_KEY
        sync: false
      - key: DJANGO_DEBUG
        value: "false"
      - key: DJANGO_ALLOWED_HOSTS
        sync: false
      - key: DJANGO_CORS_ALLOWED_ORIGINS
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: breathe-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: breathe-redis
          type: redis
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.13.2"

  - type: worker
    name: breathe-worker
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A breathe worker --loglevel=info --concurrency=2
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: breathe.settings.prod
      - key: DJANGO_SECRET_KEY
        fromService:
          type: web
          name: breathe-web
          envVarKey: DJANGO_SECRET_KEY
      - key: DATABASE_URL
        fromDatabase:
          name: breathe-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: breathe-redis
          type: redis
          property: connectionString
      - key: SENTRY_DSN
        fromService:
          type: web
          name: breathe-web
          envVarKey: SENTRY_DSN
      - key: PYTHON_VERSION
        value: "3.13.2"

  # --------------------------------------------------------------- frontend
  - type: web
    name: breathe-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    # SPA fallback: any unmatched path returns index.html.
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        sync: false        # set in dashboard to https://breathe-web.onrender.com
